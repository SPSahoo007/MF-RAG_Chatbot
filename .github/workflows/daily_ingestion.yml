name: Daily Mutual Fund Data Ingestion

on:
  schedule:
    # Run every day at 10:30 IST (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  ingest-and-commit:
    runs-on: ubuntu-latest
    
    # Needs permissions to push to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper (Phase 2.1)
        run: python src/scraper.py

      - name: Run Markdown Chunker (Phase 2.2)
        run: python src/chunking.py

      - name: Run Embed and Store (Phase 2.3)
        run: python src/embed_and_store.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add raw/ processed/ chroma_db/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update mutual fund database and artifacts"
            git push origin main
          fi
